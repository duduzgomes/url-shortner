global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: url-shortener-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-1:8080
          - api-2:8080
          - api-3:8080

  - job_name: url-shortener-prometheus
    static_configs:
      - targets:
          - prometheus:9090
